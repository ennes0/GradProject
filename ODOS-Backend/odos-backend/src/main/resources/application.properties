spring.application.name=odos-backend

# PostgreSQL (odos_routing + PostGIS)
spring.datasource.url=jdbc:postgresql://localhost:5432/odos_routing
spring.datasource.username=postgres
spring.datasource.password=${ODOS_DB_PASSWORD:179492}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA: sadece graf yükleme için kullanıyoruz; DDL/validation kapalı
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
